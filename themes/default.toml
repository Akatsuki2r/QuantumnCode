# Default Theme - Claude Code inspired
# A modern purple theme inspired by Claude Code

name = "default"
description = "Classic Claude Code inspired theme"
author = "Quantumn"

[colors]
background = "#1a1a2e"
foreground = "#eaeaea"
accent = "#7c3aed"
secondary = "#a855f7"
