# Tokyo Night Theme
# A beautiful dark theme with purple and blue accents

name = "tokyo_night"
description = "Tokyo Night - A dark theme with purple and blue accents"
author = "Quantumn"

[colors]
background = "#1a1b26"
foreground = "#c0caf5"
accent = "#7aa2f7"
secondary = "#bb9af7"
success = "#9ece6a"
error = "#f7768e"
warning = "#e0af68"
info = "#7dcfff"
selection_bg = "#364a82"
selection_fg = "#c0caf5"
border = "#3b4261"
muted = "#565f89"

[syntax]
keyword = "#bb9af7"
string = "#9ece6a"
number = "#ff9e64"
comment = "#565f89"
function = "#7aa2f7"
type = "#2ac3de"
variable = "#c0caf5"
operator = "#89ddff"
punctuation = "#89ddff"